name: windows-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version suffix, e.g. 0.1.4 or 0.1.4-rc1 (leading v optional)"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt 6.6.3
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $rawVersionValue = ""
          if ($env:GITHUB_REF_TYPE -eq "tag" -and -not [string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME)) {
            $rawVersionValue = $env:GITHUB_REF_NAME
          } elseif (-not [string]::IsNullOrWhiteSpace("${{ github.event.inputs.version }}")) {
            $rawVersionValue = "${{ github.event.inputs.version }}"
          } else {
            $rawVersionValue = "manual"
          }

          $packageVersionValue = $rawVersionValue.Trim()
          if ($packageVersionValue -match '^[vV](\d.*)$') {
            $packageVersionValue = $Matches[1]
          }

          "display_value=$rawVersionValue" >> $env:GITHUB_OUTPUT
          "package_value=$packageVersionValue" >> $env:GITHUB_OUTPUT
          if ($rawVersionValue -match 'preview|alpha|beta|rc') {
            "is_prerelease=true" >> $env:GITHUB_OUTPUT
          } else {
            "is_prerelease=false" >> $env:GITHUB_OUTPUT
          }

      - name: Package portable build
        shell: pwsh
        run: >
          .\scripts\package-windows.ps1
          -Configuration Release
          -Version "${{ steps.version.outputs.package_value }}"
          -RunTests
          -CreateInstaller

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASnap-${{ steps.version.outputs.package_value }}-windows-x64
          path: |
            dist/*.exe

      - name: Build release notes
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter 'ASnap-Setup-windows-x64-*.exe' | Select-Object -First 1
          if ($null -eq $installer) { throw 'Installer EXE not found.' }
          $shaPath = Join-Path $installer.DirectoryName ($installer.BaseName + '.sha256.txt')
          if (-not (Test-Path $shaPath)) { throw 'Installer SHA256 file not found.' }
          $shaLine = (Get-Content $shaPath | Select-Object -First 1).Trim()
          $shaValue = ($shaLine -split '\s+')[0]
          @"
          ## 推荐下载

          - **Windows 中文安装器（推荐）**：$($installer.Name)

          ## 校验信息

          - SHA256: $($shaValue)

          ## 本次整理

          - 包含当前稳定版的最新界面与交互修复
          - Release 页面只保留一个 Windows 安装器 EXE，避免重复 installer 混淆
          - 安装器保留中文体验与现代向导样式
          - 安装时支持手动选择安装路径
          "@ | Set-Content dist/release-notes.md -Encoding utf8

      - name: Remove stale installer assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tagName = "${{ steps.version.outputs.display_value }}"
          $release = gh release view $tagName --json assets 2>$null | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $null -eq $release) {
            exit 0
          }

          foreach ($asset in @($release.assets)) {
            if ($asset.name -like 'ASnap-Setup-windows-x64-*.exe') {
              gh release delete-asset $tagName $asset.name --yes
            }
          }

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ASnap ${{ steps.version.outputs.display_value }}
          body_path: dist/release-notes.md
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          files: |
            dist/ASnap-Setup-windows-x64-*.exe
