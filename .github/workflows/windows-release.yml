name: windows-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version suffix, e.g. v0.1.0-preview1"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt 6.6.3
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag" -and -not [string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME)) {
            "value=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
          } elseif (-not [string]::IsNullOrWhiteSpace("${{ github.event.inputs.version }}")) {
            "value=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            "value=manual" >> $env:GITHUB_OUTPUT
          }

      - name: Package portable build
        shell: pwsh
        run: >
          .\scripts\package-windows.ps1
          -Configuration Release
          -Version "${{ steps.version.outputs.value }}"
          -RunTests
          -CreateInstaller

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASnap-${{ steps.version.outputs.value }}-windows-x64
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.sha256.txt

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.exe
            dist/*.sha256.txt
