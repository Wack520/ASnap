name: windows-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version suffix, e.g. v0.1.0-preview1"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt 6.6.3
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $versionValue = ""
          if ($env:GITHUB_REF_TYPE -eq "tag" -and -not [string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME)) {
            $versionValue = $env:GITHUB_REF_NAME
          } elseif (-not [string]::IsNullOrWhiteSpace("${{ github.event.inputs.version }}")) {
            $versionValue = "${{ github.event.inputs.version }}"
          } else {
            $versionValue = "manual"
          }
          "value=$versionValue" >> $env:GITHUB_OUTPUT
          if ($versionValue -match 'preview|alpha|beta|rc') {
            "is_prerelease=true" >> $env:GITHUB_OUTPUT
          } else {
            "is_prerelease=false" >> $env:GITHUB_OUTPUT
          }

      - name: Package portable build
        shell: pwsh
        run: >
          .\scripts\package-windows.ps1
          -Configuration Release
          -Version "${{ steps.version.outputs.value }}"
          -RunTests
          -CreateInstaller

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASnap-${{ steps.version.outputs.value }}-windows-x64
          path: |
            dist/*.exe

      - name: Build release notes
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter 'ASnap-Setup-windows-x64-*.exe' | Select-Object -First 1
          if ($null -eq $installer) { throw 'Installer EXE not found.' }
          $shaPath = Join-Path $installer.DirectoryName ($installer.BaseName + '.sha256.txt')
          if (-not (Test-Path $shaPath)) { throw 'Installer SHA256 file not found.' }
          $shaLine = (Get-Content $shaPath | Select-Object -First 1).Trim()
          $shaValue = ($shaLine -split '\s+')[0]
          @"
          ## 推荐下载

          - **Windows 中文安装器（推荐）**：$($installer.Name)

          ## 校验信息

          - SHA256: $($shaValue)

          ## 本次整理

          - 清理公开仓库结构，移除旧版本原型代码
          - Release 页面仅保留安装器主下载项
          - 安装器完成中文化，并升级为更正式的品牌化界面
          "@ | Set-Content dist/release-notes.md -Encoding utf8

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ASnap ${{ steps.version.outputs.value }}
          body_path: dist/release-notes.md
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          files: |
            dist/ASnap-Setup-windows-x64-*.exe
